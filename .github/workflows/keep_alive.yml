name: Keep Workflows Active
 
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Keep workflows active
        run: |
          git config user.name "IntTax-Agent-Bot"
          git config user.email "int-tax-agent@noreply.github.com"
          echo "Workflows kept active: $(date -u '+%Y-%m-%d')" > .github/keep_alive.txt
          git add .github/keep_alive.txt
          git commit -m "Keep workflows active $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push || echo "Nothing to push"