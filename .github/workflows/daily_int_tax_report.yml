name: Daily International Tax Report
 
on:
  schedule:
    - cron: '30 5 * * *'
    - cron: '30 6 * * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Fetch, classify and render report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_agent.py
 
      - name: Commit and push report
        run: |
          git config user.name "IntTax-Agent-Bot"
          git config user.email "int-tax-agent@noreply.github.com"
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > last_run.txt
          git add int_tax_report.html archive.json last_run.txt
          git diff --cached --quiet || git commit -m "Int Tax report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push